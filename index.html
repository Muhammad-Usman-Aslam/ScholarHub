<!doctype html>
<html lang="en">

<head>
  <!-- Character Encoding -->
  <meta charset="UTF-8" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="./src//assets//education.png" />

  <!-- Mobile Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Title -->
  <title>ScholarHub</title>

  <!-- SEO Description -->
  <meta
    name="description"
    content="ScholarHub helps students discover scholarships, universities, internships, fellowships, research opportunities, and study abroad programs worldwide."
  />

  <!-- Keywords -->
  <meta
    name="keywords"
    content="Scholarships, Universities, Study Abroad, Fellowships, Research, Internships, Education, ScholarHub"
  />

  <!-- Author -->
  <meta name="author" content="ScholarHub" />

  <!-- Search Engine -->
  <meta name="robots" content="index, follow" />

  <!-- Theme Color -->
  <meta name="theme-color" content="#0d6efd" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://scholarhubwithusman.vercel.app/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="ScholarHub" />
  <meta property="og:title" content="ScholarHub | Find Scholarships & Universities" />
  <meta
    property="og:description"
    content="Discover scholarships, universities, internships, fellowships, and educational opportunities from around the world."
  />
  <meta property="og:url" content="https://scholarhubwithusman.vercel.app/" />

</head>

<body>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

  <script type="text/javascript">
    (function (l) {
      if (l.search[1] === "/") {
        var decoded = l.search
          .slice(1)
          .split("&")
          .map(function (s) {
            return s.replace(/~and~/g, "&");
          })
          .join("?");
        window.history.replaceState(
          null,
          null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    })(window.location);
  </script>

</body>

</html>
